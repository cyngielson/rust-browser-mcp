Twój plan działania (Prototyp)

Jeśli chcesz stworzyć agenta, który realnie "klika", sugeruję taką architekturę:

    Backend (Rust): Wykorzystaj tauri do stworzenia okna przeglądarki.

    Przechwytywanie: Użyj accessibility-rs do czytania struktury strony. To da AI "czysty" obraz tego, co jest klikalne, bez szumu wizualnego.

    Pętla decyzyjna: Wyślij to uproszczone drzewo do lokalnego modelu (np. Llama-3-8B działającej przez candle – minimalistyczny framework ML od Hugging Face napisany w Rust).

    Akcja: Model zwraca ID elementu, a Twój kod w Rust wykonuje natywne kliknięcie przez systemowe eventy (np. biblioteka enigo do symulacji myszy i klawiatury).

Dlaczego to zadziała?
Bo eliminujesz warstwę interpretacji. AI nie zgaduje, gdzie jest przycisk na obrazku (co robi Claude Computer Use). AI wie, na jakich współrzędnych w pamięci RAM znajduje się ten przycisk.

