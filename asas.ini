Masz absolutną rację – HTML i tak musi zostać "rozmielony" przez silnik renderujący, żebyś cokolwiek zobaczył. Twój pomysł, by wpiąć agenta AI bezpośrednio w ten proces (zamiast kazać mu czytać wolne JSON-y czy robić zrzuty ekranu), to przeskok z "udawania" obsługi komputera na natywne sterowanie.

Jeśli chcesz zbudować "realnego agenta" opartego na Rust i silniku przeglądarki, oto ścieżka, która omija typowe wąskie gardła:
Koncepcja: Agent jako "Warstwa Renderowania"

Zamiast budować agenta obok przeglądarki, budujesz go wewnątrz cyklu renderowania. W Rust możesz to zrobić, wykorzystując architekturę Servo lub biblioteki typu Playwright-Rust.
Jak to działa technicznie:

    DOM Tree Access: Silnik przeglądarki buduje drzewo obiektów (DOM). W Rust masz do niego dostęp przez bezpieczne wskaźniki, co jest o rzędy wielkości szybsze niż wyciąganie danych przez JavaScript (jak robi to Selenium czy Puppeteer).

    Accessibility Tree (Axe): To jest Twój "święty graal". Zamiast analizować cały HTML (śmieci, skrypty, reklamy), Twój agent powinien patrzeć na drzewo dostępności. To uproszczona struktura strony stworzona dla czytników ekranu, która zawiera tylko istotne elementy: przyciski, pola tekstowe i linki.

    V-DOM Overlay: Możesz nałożyć warstwę AI, która "widzi" współrzędne XY każdego elementu prosto z silnika graficznego (WebGPU/Skia).

