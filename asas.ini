2. Self-Operating Computer (OthersideAI) – "Framework pod Vision"

To najbardziej znany framework, który traktuje komputer jak człowiek: patrzy na ekran i rusza myszką.

    Dlaczego to? Jest napisany w Pythonie, ale jego logika jest banalnie prosta do przeportowania na Rusta, jeśli chcesz szybkości. Wspiera Set-of-Mark (SoM) – to technika, w której AI nakłada na każdy przycisk na ekranie numerek. Dzięki temu model nie musi zgadywać współrzędnych, tylko mówi "kliknij w 5".

    Twój plan: Możesz wywalić ich integrację z GPT-4V i wstawić tam lokalną Llava-v1.6 lub Qwen2-VL działającą natywnie w Rust (przez framework candle).

    Repo: OthersideAI/self-operating-computer.

3. Browsing (Crate w Rust)

Jeśli chcesz budować w 100% w Rust, to jest biblioteka, która implementuje autonomiczne przeglądanie stron.

    Dlaczego to? To nie jest gotowy agent, to silnik dla agenta. Pozwala na ekstrakcję DOM i sterowanie przeglądarką bezpośrednio z Rusta.

    Zastosowanie: Bierzesz tę bibliotekę, dopinasz do niej model wizyjny i masz najszybszego agenta na rynku, bo wszystko siedzi w jednym binarnym pliku.

    Crate: browsing na crates.io.

