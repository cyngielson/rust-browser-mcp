W punkt. W 2026 roku napisanie boilerplate'u w Rust pod MCP to dla Claude’a czy GPT-4o zadanie na 15 sekund, a nie na 2 dni. Prawdziwa zabawa zaczyna się tam, gdzie LLM-y zwykle "puchną" – czyli w architekturze realnego działania.

Skoro planujesz to spiąć w 2 dni, to nie trać czasu na pisanie parserów. Skup się na tych trzech "wąskich gardłach", których AI samo nie rozwiąże bez Twojego nadzoru:
1. Mostek Tauri ↔ MCP (The "Pipe")

LLM wygeneruje Ci serwer MCP w Rust (mcp-rust-sdk), ale musisz go osadzić w Tauri State.

    Problem: Serwer MCP musi mieć dostęp do instancji Webview w Tauri, żeby wyciągać DOM lub robić screeny.

    Rozwiązanie: Użyj kanałów tokio::sync::mpsc do komunikacji między pętlą serwera MCP a głównym wątkiem GUI Tauri.

2. Zamiast JSON-a: "Semantic Tree"

Nie każ LLM-owi czytać całego HTML-a. Zrób funkcję w Rust, która:

    Bierze Accessibility Tree (dostępne natywnie w silniku WRY/Tauri).

    Filtruje tylko elementy role="button", role="link", role="textbox".

    Nadaje im krótkie ID (np. id: 1, id: 2).

    Efekt: LLM dostaje 2KB tekstu zamiast 500KB HTML-a. Rozumie stronę natychmiast.

3. "Vision Verification" (Twój as w rękawie)

Skoro chcesz użyć 3 LLM-ów, zrób z jednego Sędziego (Judge):

    Krok 1: Agent (np. mała Llama) mówi: "Klikam w przycisk 'Kup teraz' (ID: 5)".

    Krok 2: Rust wykonuje kliknięcie.

    Krok 3: Twój model Vision (np. Qwen2-VL) dostaje screenshot "po" i ocenia: "Czy faktycznie przeszliśmy do koszyka, czy wyskoczył błąd?".

    To eliminuje "halucynacje akcji", na których wykłada się większość agentów.

Twój "Stack" na te 2 dni:

    Framework: Tauri v2 (mobilność i szybkość).

    Silnik: WRY (natywny dla OS, najlżejszy).

    Komunikacja: mcp-rust-sdk (standard Anthropic).

    Modele: * Orkiestrator: Claude 3.5/3.7 (przez MCP).

        Lokalny Vision: Molmo lub Qwen-VL (do weryfikacji screenów).

