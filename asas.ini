Jeśli masz do dyspozycji 3 modele, podziel im role, żeby nie "zasuwały po JSON-ach":

    Model 1 (Vision Specialist): Robi screenshot (przez Rust/Bevy), nakłada siatkę i mówi: "Widzę przycisk 'Zaloguj' na środku".

